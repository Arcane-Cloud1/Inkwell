name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync version from tag
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Version: $TAG"
          npm version "$TAG" --no-git-tag-version --allow-same-version
          echo "VERSION_NAME=$TAG" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Build Electron EXE
        run: pnpm electron:build

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            release/*.exe
            release/*.msi
          retention-days: 1

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Version: $TAG"
          npm version "$TAG" --no-git-tag-version --allow-same-version
          # Compute versionCode: major*10000 + minor*100 + patch
          IFS='.' read -ra PARTS <<< "$TAG"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]:-0}
          PATCH=${PARTS[2]:-0}
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "VersionCode: $VERSION_CODE"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$TAG" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync

      - name: Patch Android version
        run: |
          # Update versionCode and versionName in build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ env.VERSION_CODE }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ env.VERSION_NAME }}\"/" android/app/build.gradle
          echo "=== build.gradle version info ==="
          grep -E "version(Code|Name)" android/app/build.gradle

      - name: Prepare release keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "has_keystore=true" >> $GITHUB_OUTPUT
            echo "Keystore prepared"
          else
            echo "has_keystore=false" >> $GITHUB_OUTPUT
            echo "No keystore secret found, will build debug APK"
          fi

      - name: Build Release APK (signed)
        if: steps.keystore.outputs.has_keystore == 'true'
        working-directory: android
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'inkwell2026' }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'inkwell' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'inkwell2026' }}
        run: |
          chmod +x gradlew
          # Add release signing config to build.gradle
          sed -i '/buildTypes {/a\        release {\n            signingConfig signingConfigs.release\n        }' app/build.gradle
          # Add signingConfigs
          sed -i "/defaultConfig {/i\\    signingConfigs {\n        release {\n            storeFile file(\"$KEYSTORE_FILE\")\n            storePassword \"$KEYSTORE_PASSWORD\"\n            keyAlias \"$KEY_ALIAS\"\n            keyPassword \"$KEY_PASSWORD\"\n        }\n    }" app/build.gradle
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/*.apk ../release-android.apk

      - name: Build Debug APK (unsigned fallback)
        if: steps.keystore.outputs.has_keystore == 'false'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cp app/build/outputs/apk/debug/*.apk ../release-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-android.apk
          retention-days: 1

  build-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          zip -r inkwell-source.zip . \
            -x "node_modules/*" \
            -x ".pnpm-store/*" \
            -x ".git/*" \
            -x ".trae/*" \
            -x "dist/*" \
            -x "release/*" \
            -x "android/*" \
            -x "ios/*" \
            -x "*.log"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: inkwell-source.zip
          retention-days: 1

  release:
    needs: [build-windows, build-android, build-source]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Move EXE files (handle spaces in filenames)
          find artifacts/windows-exe -name "*.exe" -exec cp {} release-assets/ \; 2>/dev/null || true
          find artifacts/windows-exe -name "*.msi" -exec cp {} release-assets/ \; 2>/dev/null || true
          # Move APK file
          find artifacts/android-apk -name "*.apk" -exec cp {} release-assets/Inkwell.apk \; 2>/dev/null || true
          # Move source zip
          find artifacts/source-code -name "*.zip" -exec cp {} release-assets/ \; 2>/dev/null || true
          # List files
          echo "=== Release Assets ==="
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          body: |
            ## 📦 Inkwell Release
            
            ### 下载内容
            
            | 文件 | 说明 |
            |------|------|
            | `Inkwell Setup *.exe` | Windows 安装包 |
            | `Inkwell *.exe` | Windows 便携版 |
            | `Inkwell.apk` | Android 安装包 |
            | `inkwell-source.zip` | 源码压缩包 |
            
            ### 使用方式
            
            **Windows**: 双击 EXE 安装或运行便携版
            
            **Android**: 传输 APK 到手机，点击安装（需开启"允许未知来源"）
            
            **源码**: 解压后执行 `pnpm install && pnpm dev`